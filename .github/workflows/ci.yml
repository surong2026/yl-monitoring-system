name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ --count --max-line-length=120 --statistics

      - name: Test with pytest
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing

  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PR Review Summary
        run: |
          echo "## PR Review Checklist" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 代码符合 PEP 8 规范" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 单元测试覆盖新增功能" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 标准限值数据(standards/*.json)正确" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 数据库变更与 models.py 一致" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 文档已同步更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 请 Claude Code 或 WorkBuddy 审阅此 PR 的代码变更。" >> $GITHUB_STEP_SUMMARY
          echo "> 使用命令: \`gh pr checkout ${{ github.event.pull_request.number }} && gh pr diff | ai-review\`" >> $GITHUB_STEP_SUMMARY
